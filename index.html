<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Web Clone - High Performance</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: white; }
        canvas { display: block; }

        /* UI Styles */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .menu-screen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
        .hidden { display: none !important; }

        .btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none; padding: 15px 40px; color: white; font-size: 24px; font-weight: bold;
            cursor: pointer; margin: 10px; border-radius: 5px; text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s; pointer-events: all;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(243, 156, 18, 0.6); }

        /* HUD */
        #hud { position: absolute; bottom: 0; width: 100%; height: 120px; display: flex; justify-content: space-between; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        .stat-box { background: rgba(0,0,0,0.5); padding: 10px 20px; border-left: 5px solid #f39c12; }
        .hp-text { font-size: 48px; font-weight: bold; }
        
        .weapon-slots { display: flex; gap: 10px; }
        .slot { width: 80px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; }
        .slot.active { border-color: #f39c12; background: rgba(243, 156, 18, 0.2); }
        .slot img { max-width: 90%; filter: brightness(0) invert(1); }

        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        .ch-line { position: absolute; background: #0f0; }
        .v-line { left: 9px; width: 2px; height: 100%; }
        .h-line { top: 9px; height: 2px; width: 100%; }

        /* Inventory Overlay */
        #inventory-screen { background: rgba(20, 20, 25, 0.9); }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .inv-item { background: #2c3e50; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
        .inv-item:hover { background: #34495e; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="lobby-screen" class="menu-screen">
        <h1 style="font-size: 64px; margin-bottom: 50px;">COUNTER-STRIKE <span style="color: #f39c12;">2</span> WEB</h1>
        <button class="btn" onclick="showModes()">ГРАТИ</button>
        <button class="btn" onclick="toggleInventory(true)">ІНВЕНТАР</button>
    </div>

    <div id="mode-screen" class="menu-screen hidden">
        <h2>ОБЕРІТЬ РЕЖИМ</h2>
        <button class="btn" onclick="startGame(1)">1 VS 1</button>
        <button class="btn" onclick="startGame(2)">2 VS 2</button>
        <button class="btn" onclick="hideModes()" style="background: #7f8c8d;">НАЗАД</button>
    </div>

    <div id="inventory-screen" class="menu-screen hidden">
        <h2>ВАШ ІНВЕНТАР</h2>
        <div class="inv-grid">
            <div class="inv-item" onclick="selectWeapon(0)">
                <div style="height: 60px; background: #555;">AKR</div>
                <p>Default Skin</p>
            </div>
            <div class="inv-item" onclick="selectWeapon(1)">
                <div style="height: 60px; background: #555;">GLOCK</div>
                <p>Steel</p>
            </div>
            <div class="inv-item" onclick="selectWeapon(2)">
                <div style="height: 60px; background: #f39c12;">BUTTERFLY</div>
                <p>Fade Animation</p>
            </div>
        </div>
        <button class="btn" onclick="toggleInventory(false)" style="margin-top: 40px;">ЗАКРИТИ</button>
    </div>

    <div id="game-hud" class="hidden">
        <div id="crosshair">
            <div class="ch-line v-line"></div>
            <div class="ch-line h-line"></div>
        </div>
        <div id="hud">
            <div class="stat-box">
                <span style="color: #f39c12; font-size: 14px;">ЗДОРОВ'Я</span>
                <div class="hp-text" id="hp-val">100</div>
            </div>
            <div class="weapon-slots">
                <div class="slot" id="slot-1">AKR</div>
                <div class="slot" id="slot-2">PISTOL</div>
                <div class="slot active" id="slot-3">KNIFE</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * CS2 WEB ENGINE
 * CORE LOGIC
 */

// Global Variables
let scene, camera, renderer, clock;
let player = {
    height: 1.8,
    speed: 0.15,
    hp: 100,
    weapon: 'knife',
    inGame: false
};
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let objects = []; // For collision
let enemies = [];
let teammates = [];
let currentWeaponModel = null;
let weaponGroup = new THREE.Group(); // Weapon attached to camera

// Initialization
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    scene.fog = new THREE.Fog(0x222222, 0, 50);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    createMap();
    setupLobbyScene();
    animate();
}

// Map Creation (Simple Arena)
function createMap() {
    // Floor
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Walls & Boxes
    const boxGeo = new THREE.BoxGeometry(2, 2, 2);
    const boxMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    
    for(let i=0; i<15; i++) {
        let box = new THREE.Mesh(boxGeo, boxMat);
        box.position.set(Math.random()*40-20, 1, Math.random()*40-20);
        box.castShadow = true;
        scene.add(box);
        objects.push(box);
    }
}

/** * WEAPON MODELS (Procedural)
 */
function createAKR() {
    const group = new THREE.Group();
    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
    group.add(body);
    // Barrel
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    barrel.rotation.x = Math.PI/2;
    barrel.position.z = 0.5;
    group.add(barrel);
    // Stock (Wood)
    const stock = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.3), new THREE.MeshStandardMaterial({color: 0x5d4037}));
    stock.position.z = -0.4;
    group.add(stock);
    return group;
}

function createPistol() {
    const group = new THREE.Group();
    const slide = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.3), new THREE.MeshStandardMaterial({color: 0x333333}));
    group.add(slide);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.2, 0.08), new THREE.MeshStandardMaterial({color: 0x222222}));
    grip.position.y = -0.12;
    grip.position.z = -0.05;
    group.add(grip);
    return group;
}

function createButterflyKnife() {
    const group = new THREE.Group();
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.25, 0.05), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8}));
    blade.position.y = 0.2;
    group.add(blade);
    const handle1 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.2, 0.03), new THREE.MeshStandardMaterial({color: 0xff4400}));
    handle1.position.x = 0.02;
    group.add(handle1);
    const handle2 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.2, 0.03), new THREE.MeshStandardMaterial({color: 0xff4400}));
    handle2.position.x = -0.02;
    group.add(handle2);
    return group;
}

// Bot / Character Creation
function createCharacter(color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({color: color}));
    body.position.y = 0.9;
    group.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    head.position.y = 1.6;
    group.add(head);
    return group;
}

/**
 * GAME ENGINE STATE
 */
function setupLobbyScene() {
    camera.position.set(0, 1.6, 4);
    player.inGame = false;
    
    // Character in lobby
    const lobbyChar = createCharacter(0x3498db);
    lobbyChar.position.set(0, 0, 0);
    scene.add(lobbyChar);
    
    const knife = createButterflyKnife();
    knife.position.set(0.4, 1.2, 0.3);
    knife.rotation.x = Math.PI/2;
    lobbyChar.add(knife);
}

function showModes() {
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('mode-screen').classList.remove('hidden');
}

function hideModes() {
    document.getElementById('mode-screen').classList.add('hidden');
    document.getElementById('lobby-screen').classList.remove('hidden');
}

function toggleInventory(show) {
    if(show) {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('inventory-screen').classList.remove('hidden');
    } else {
        document.getElementById('inventory-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }
}

function selectWeapon(type) {
    const slots = ['slot-1', 'slot-2', 'slot-3'];
    slots.forEach(s => document.getElementById(s).classList.remove('active'));
    
    if(type === 0) { player.weapon = 'akr'; document.getElementById('slot-1').classList.add('active'); }
    if(type === 1) { player.weapon = 'pistol'; document.getElementById('slot-2').classList.add('active'); }
    if(type === 2) { player.weapon = 'knife'; document.getElementById('slot-3').classList.add('active'); }
    
    updateWeaponInHand();
}

function updateWeaponInHand() {
    while(weaponGroup.children.length > 0) weaponGroup.remove(weaponGroup.children[0]);
    
    let model;
    if(player.weapon === 'akr') model = createAKR();
    else if(player.weapon === 'pistol') model = createPistol();
    else model = createButterflyKnife();
    
    model.position.set(0.3, -0.3, -0.5);
    weaponGroup.add(model);
    currentWeaponModel = model;
}

function startGame(mode) {
    document.getElementById('mode-screen').classList.add('hidden');
    document.getElementById('game-hud').classList.remove('hidden');
    
    player.inGame = true;
    player.hp = 100;
    document.getElementById('hp-val').innerText = player.hp;
    
    // Clear lobby artifacts and setup game
    camera.position.set(20, 1.6, 20);
    camera.add(weaponGroup);
    scene.add(camera);
    updateWeaponInHand();

    // Lock Pointer
    document.body.requestPointerLock();

    // Spawn Bots
    spawnBots(mode);
}

function spawnBots(mode) {
    // Enemies (Red)
    for(let i=0; i < mode; i++) {
        let enemy = createCharacter(0xe74c3c);
        enemy.position.set(Math.random()*20-10, 0, Math.random()*(-20));
        enemy.userData = { hp: 100, type: 'enemy' };
        scene.add(enemy);
        enemies.push(enemy);
    }
    // Teammate (Blue) if 2v2
    if(mode === 2) {
        let buddy = createCharacter(0x3498db);
        buddy.position.set(18, 0, 18);
        scene.add(buddy);
        teammates.push(buddy);
    }
}

/**
 * CONTROLS & ANIMATION
 */
document.addEventListener('keydown', (e) => {
    switch(e.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyD': moveRight = true; break;
        case 'Digit1': selectWeapon(0); break;
        case 'Digit2': selectWeapon(1); break;
        case 'Digit3': selectWeapon(2); break;
    }
});

document.addEventListener('keyup', (e) => {
    switch(e.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyD': moveRight = false; break;
    }
});

document.addEventListener('mousemove', (e) => {
    if(player.inGame) {
        camera.rotation.y -= e.movementX * 0.002;
        camera.rotation.x -= e.movementY * 0.002;
        camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
    }
});

document.addEventListener('mousedown', () => {
    if(player.inGame) shoot();
});

function shoot() {
    // Animation
    if(player.weapon === 'knife') {
        currentWeaponModel.rotation.x += 0.5;
        setTimeout(() => currentWeaponModel.rotation.x -= 0.5, 100);
    } else {
        currentWeaponModel.position.z += 0.05;
        setTimeout(() => currentWeaponModel.position.z -= 0.05, 50);
    }

    // Raycasting for hits
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(enemies, true);

    if(intersects.length > 0) {
        let hitObj = intersects[0].object;
        let bot = hitObj.parent;
        bot.userData.hp -= (player.weapon === 'akr' ? 35 : 20);
        console.log("Hit! Bot HP:", bot.userData.hp);
        
        if(bot.userData.hp <= 0) {
            scene.remove(bot);
            enemies = enemies.filter(e => e !== bot);
            if(enemies.length === 0) alert("ПЕРЕМОГА!");
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if(player.inGame) {
        // Movement
        if(moveForward) camera.translateZ(-player.speed);
        if(moveBackward) camera.translateZ(player.speed);
        if(moveLeft) camera.translateX(-player.speed);
        if(moveRight) camera.translateX(player.speed);
        camera.position.y = 1.6; // Keep height

        // Knife Animation (Idle)
        if(player.weapon === 'knife' && currentWeaponModel) {
            currentWeaponModel.rotation.y = Math.sin(Date.now() * 0.005) * 0.1;
        }

        // Simple Bot AI (Follow player)
        enemies.forEach(bot => {
            bot.lookAt(camera.position.x, 0, camera.position.z);
            bot.translateZ(0.03);
            
            // Damage player if close
            if(bot.position.distanceTo(camera.position) < 2) {
                player.hp -= 0.1;
                document.getElementById('hp-val').innerText = Math.ceil(player.hp);
                if(player.hp <= 0) location.reload(); 
            }
        });
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();

</script>
</body>
</html>
