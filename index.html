<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Web Pro v2.0</title>
    <style>
        /* --- ДИЗАЙН СИСТЕМА (ЗМІННІ) --- */
        :root {
            --primary: #3390ec;
            --primary-soft: #54a9eb;
            --bg-main: #ffffff;
            --bg-sidebar: #f4f4f5;
            --bg-item-hover: #f1f1f1;
            --text-main: #000000;
            --text-muted: #707579;
            --border: #dfe1e5;
            --msg-own: #eeffde;
            --msg-other: #ffffff;
            --danger: #e53935;
            --input-bg: #ffffff;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --verify-blue: #3390ec;
        }

        [data-theme="dark"] {
            --primary: #8774e1;
            --primary-soft: #9a89ec;
            --bg-main: #181818;
            --bg-sidebar: #212121;
            --bg-item-hover: #2b2b2b;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #303030;
            --msg-own: #766ac8;
            --msg-other: #212121;
            --input-bg: #181818;
            --shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* --- БАЗОВІ СТИЛІ --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { height: 100vh; display: flex; background: var(--bg-main); color: var(--text-main); overflow: hidden; transition: background 0.3s, color 0.3s; }

        /* Стильні скролбари */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

        /* --- ВЕРИФІКАЦІЯ (SVG) --- */
        .verify-badge {
            width: 18px; height: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            vertical-align: middle; margin-left: 4px;
            flex-shrink: 0;
        }

        /* --- ЕКРАНИ --- */
        #auth-screen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: var(--bg-sidebar); z-index: 2000; }
        .auth-box { background: var(--bg-main); padding: 40px; border-radius: 20px; box-shadow: var(--shadow); width: 100%; max-width: 360px; text-align: center; border: 1px solid var(--border); }
        .auth-box input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--input-bg); color: var(--text-main); outline: none; transition: 0.2s; }
        .auth-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(51, 144, 236, 0.2); }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; background: var(--primary); color: white; width: 100%; transition: all 0.2s ease; }
        .btn:hover { background: var(--primary-soft); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-secondary { background: var(--bg-sidebar); color: var(--text-main); border: 1px solid var(--border); margin-top: 8px; }

        /* --- LAYOUT --- */
        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        .sidebar { width: 380px; border-right: 1px solid var(--border); background: var(--bg-main); display: flex; flex-direction: column; z-index: 10; }
        
        .sidebar-header { padding: 15px; display: flex; align-items: center; gap: 10px; }
        .search-container { padding: 0 15px 10px 15px; position: relative; }
        .search-container input { width: 100%; padding: 10px 15px; border-radius: 22px; border: 1px solid var(--border); background: var(--bg-sidebar); color: var(--text-main); outline: none; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); position: relative; }

        /* --- СПИСОК КОРИСТУВАЧІВ --- */
        .user-list { flex: 1; overflow-y: auto; }
        .list-section-title { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--primary); background: rgba(51,144,236,0.05); }
        .user-item { display: flex; align-items: center; padding: 10px 15px; cursor: pointer; transition: 0.2s; margin: 2px 8px; border-radius: 10px; animation: fadeIn 0.3s ease; }
        .user-item:hover { background: var(--bg-item-hover); }
        .user-item.active { background: var(--primary); color: white; }
        .user-item.active .text-muted { color: rgba(255,255,255,0.7); }

        .avatar { width: 54px; height: 54px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; flex-shrink: 0; margin-right: 15px; background-size: cover; background-position: center; }

        /* --- CHAT AREA --- */
        .chat-header { height: 60px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-main); }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-sidebar); }
        
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; animation: msgSlide 0.2s ease-out; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.own { align-self: flex-end; background: var(--msg-own); border-bottom-right-radius: 4px; color: #000; }
        [data-theme="dark"] .msg.own { color: #fff; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .msg-time { font-size: 11px; opacity: 0.5; margin-left: 8px; float: right; margin-top: 4px; }

        .input-area { padding: 15px 20px; background: var(--bg-main); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 12px 18px; border-radius: 22px; border: 1px solid var(--border); outline: none; background: var(--bg-sidebar); color: var(--text-main); }
        .banned-notice { flex: 1; text-align: center; color: var(--danger); font-weight: 600; padding: 12px; background: rgba(229, 57, 53, 0.1); border-radius: 10px; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-main); padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow); position: relative; border: 1px solid var(--border); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-muted); }

        /* --- АДМІНКА ТАБЛИЦЯ --- */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .admin-table th, .admin-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .status-online { background: #4caf50; color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Адаптивність */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; transition: 0.3s; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
        }
    </style>
</head>
<body>

    <svg style="display: none;">
        <symbol id="icon-verify" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="11" fill="url(#blueGrad)" />
            <path d="M7 12L10 15L17 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <defs>
                <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#54a9eb;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#3390ec;stop-opacity:1" />
                </linearGradient>
            </defs>
        </symbol>
    </svg>

    <div id="auth-screen">
        <div class="auth-box" id="auth-login">
            <h2 style="color: var(--primary); margin-bottom: 5px;">Telegram</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Web Professional</p>
            <input type="text" id="login-username" placeholder="Логін">
            <input type="password" id="login-pass" placeholder="Пароль">
            <button class="btn" onclick="app.login()">Увійти</button>
            <button class="btn btn-secondary" onclick="app.showReg(true)">Створити акаунт</button>
        </div>
        <div class="auth-box" id="auth-reg" style="display: none;">
            <h2>Реєстрація</h2>
            <input type="text" id="reg-username" placeholder="Придумайте логін">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button class="btn" onclick="app.register()">Зареєструватися</button>
            <button class="btn btn-secondary" onclick="app.showReg(false)">Назад до входу</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div style="font-weight: 800; color: var(--primary); font-size: 20px; flex: 1;">Telegram</div>
                <button class="btn" style="width: auto; padding: 8px 12px; font-size: 13px;" onclick="app.openSettings()">⚙️</button>
            </div>
            <div class="search-container">
                <input type="text" id="main-search" placeholder="Пошук людей..." oninput="app.handleSearch()">
            </div>
            <div class="user-list" id="user-list">
                </div>
        </div>

        <main class="chat-area">
            <div id="chat-empty" style="display: flex; flex: 1; align-items: center; justify-content: center; color: var(--text-muted); background: var(--bg-sidebar);">
                Оберіть чат через пошук, щоб почати
            </div>
            
            <div id="chat-window" style="display: none; flex-direction: column; height: 100%;">
                <header class="chat-header">
                    <div class="avatar" id="header-avatar" style="width: 40px; height: 40px; margin-right: 12px; font-size: 16px;"></div>
                    <div>
                        <div style="font-weight: bold; display: flex; align-items: center;">
                            <span id="header-name">Username</span>
                            <span id="header-verify-area"></span>
                        </div>
                        <div style="font-size: 12px; color: var(--primary);">онлайн</div>
                    </div>
                </header>

                <div class="messages" id="messages-box"></div>

                <div class="input-area" id="input-container">
                    </div>
            </div>
        </main>
    </div>

    <div class="modal" id="modal-settings">
        <div class="modal-content">
            <span class="close-modal" onclick="app.closeModals()">&times;</span>
            <h3>Мій профіль</h3>
            <div style="margin: 20px 0;">
                <label style="font-size: 12px; color: var(--text-muted);">Ваше ім'я:</label>
                <input type="text" id="set-nick" class="auth-box" style="width:100%; margin-top:5px; padding:10px; box-shadow:none;">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                    <span>Темна тема</span>
                    <input type="checkbox" id="theme-toggle" onchange="app.toggleTheme()">
                </div>
            </div>
            <button class="btn" onclick="app.saveProfile()">Зберегти</button>
            <button class="btn btn-secondary" style="color: var(--danger); border-color: var(--danger);" onclick="app.logout()">Вийти з акаунта</button>
        </div>
    </div>

    <div class="modal" id="modal-admin">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-modal" onclick="app.closeModals()">&times;</span>
            <h3 style="color: var(--primary);">Адмін-центр 👑</h3>
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">Керування користувачами та безпекою</p>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Користувач</th>
                        <th>Статус</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="admin-user-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        /* --- ЛОГІКА ДОДАТКА --- */
        const app = {
            currentUser: null,
            activeChat: null,
            isSearching: false,

            init() {
                this.loadSession();
                this.setupHotkeys();
                if (this.currentUser) this.start();
                
                // Інтервал оновлення (імітація реального часу)
                setInterval(() => {
                    if (this.currentUser && !this.isSearching) this.renderUserList();
                    if (this.activeChat) this.renderMessages();
                }, 2000);
            },

            // --- ДАНІ ---
            getDb(key) { return JSON.parse(localStorage.getItem('tg_' + key)) || (key === 'users' ? {} : []); },
            setDb(key, val) { localStorage.setItem('tg_' + key, JSON.stringify(val)); },

            // --- ВЕРИФІКАЦІЯ ---
            getVerifyHTML() {
                return `<span class="verify-badge"><svg><use href="#icon-verify"></use></svg></span>`;
            },

            // --- АВТОРИЗАЦІЯ ---
            loadSession() {
                const session = localStorage.getItem('tg_session');
                if (session) {
                    const users = this.getDb('users');
                    this.currentUser = users[session];
                }
            },

            showReg(val) {
                document.getElementById('auth-login').style.display = val ? 'none' : 'block';
                document.getElementById('auth-reg').style.display = val ? 'block' : 'none';
            },

            register() {
                const u = document.getElementById('reg-username').value.trim().toLowerCase();
                const p = document.getElementById('reg-pass').value;
                const users = this.getDb('users');

                if (!u || p.length < 4) return alert("Логін та пароль занадто короткі");
                if (users[u]) return alert("Логін зайнятий");

                users[u] = { 
                    username: u, pass: p, nick: u, 
                    avatar: '', verified: u === 'admin', 
                    isBanned: false, role: u === 'admin' ? 'admin' : 'user',
                    activeChats: [] 
                };
                this.setDb('users', users);
                alert("Готово! Тепер увійдіть.");
                this.showReg(false);
            },

            login() {
                const u = document.getElementById('login-username').value.trim().toLowerCase();
                const p = document.getElementById('login-pass').value;
                const users = this.getDb('users');

                if (users[u] && users[u].pass === p) {
                    this.currentUser = users[u];
                    localStorage.setItem('tg_session', u);
                    this.start();
                } else {
                    alert("Помилка входу");
                }
            },

            logout() {
                localStorage.removeItem('tg_session');
                location.reload();
            },

            start() {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                
                // Тема
                const dark = localStorage.getItem('tg_theme') === 'dark';
                document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
                document.getElementById('theme-toggle').checked = dark;

                this.renderUserList();
            },

            // --- ГАРЯЧІ КЛАВІШІ ---
            setupHotkeys() {
                window.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.shiftKey && e.code === 'KeyA') {
                        if (this.currentUser && this.currentUser.role === 'admin') {
                            this.openAdmin();
                        }
                    }
                });
            },

            // --- ПОШУК ТА СПИСОК ЧАТІВ ---
            handleSearch() {
                const query = document.getElementById('main-search').value.trim().toLowerCase();
                this.isSearching = query.length > 0;
                this.renderUserList(query);
            },

            renderUserList(query = "") {
                const container = document.getElementById('user-list');
                const users = this.getDb('users');
                container.innerHTML = '';

                if (this.isSearching) {
                    container.innerHTML = '<div class="list-section-title">Глобальний пошук</div>';
                    Object.values(users).forEach(u => {
                        if (u.username !== this.currentUser.username && 
                           (u.username.includes(query) || u.nick.toLowerCase().includes(query))) {
                            container.appendChild(this.createUserElement(u));
                        }
                    });
                } else {
                    container.innerHTML = '<div class="list-section-title">Ваші чати</div>';
                    const activeChats = this.currentUser.activeChats || [];
                    if (activeChats.length === 0) {
                        container.innerHTML += '<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:13px;">Тут будуть ваші діалоги</div>';
                    }
                    activeChats.forEach(username => {
                        if (users[username]) container.appendChild(this.createUserElement(users[username]));
                    });
                }
            },

            createUserElement(user) {
                const div = document.createElement('div');
                div.className = `user-item ${this.activeChat === user.username ? 'active' : ''}`;
                div.onclick = () => this.selectChat(user.username);
                
                const initial = user.nick[0].toUpperCase();
                div.innerHTML = `
                    <div class="avatar">${initial}</div>
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight:600; display:flex; align-items:center;">
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${user.nick}</span>
                            ${user.verified ? this.getVerifyHTML() : ''}
                        </div>
                        <div class="text-muted" style="font-size:13px;">@${user.username}</div>
                    </div>
                `;
                return div;
            },

            // --- ЧАТ ---
            selectChat(username) {
                this.activeChat = username;
                const user = this.getDb('users')[username];
                
                document.getElementById('chat-empty').style.display = 'none';
                document.getElementById('chat-window').style.display = 'flex';
                
                document.getElementById('header-name').innerText = user.nick;
                document.getElementById('header-verify-area').innerHTML = user.verified ? this.getVerifyHTML() : '';
                document.getElementById('header-avatar').innerText = user.nick[0].toUpperCase();

                this.updateInputArea();
                this.renderMessages();
                this.renderUserList();
            },

            updateInputArea() {
                const container = document.getElementById('input-container');
                const user = this.getDb('users')[this.currentUser.username];

                if (user.isBanned) {
                    container.innerHTML = `<div class="banned-notice">Ви заблоковані адміністратором і не можете писати повідомлення.</div>`;
                } else {
                    container.innerHTML = `
                        <input type="text" id="msg-input" placeholder="Напишіть повідомлення..." onkeypress="if(event.key==='Enter') app.sendMessage()">
                        <button class="btn" style="width:auto;" onclick="app.sendMessage()">Надіслати</button>
                    `;
                }
            },

            sendMessage() {
                const input = document.getElementById('msg-input');
                const text = input.value.trim();
                if (!text || !this.activeChat) return;

                const messages = this.getDb('messages');
                const newMessage = {
                    from: this.currentUser.username,
                    to: this.activeChat,
                    text: text,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    id: Date.now()
                };

                messages.push(newMessage);
                this.setDb('messages', messages);

                // Додати в список активних чатів (якщо ще нема)
                const users = this.getDb('users');
                if (!users[this.currentUser.username].activeChats.includes(this.activeChat)) {
                    users[this.currentUser.username].activeChats.push(this.activeChat);
                    this.currentUser.activeChats.push(this.activeChat);
                    this.setDb('users', users);
                }

                input.value = '';
                this.renderMessages();
            },

            renderMessages() {
                const box = document.getElementById('messages-box');
                const allMessages = this.getDb('messages');
                const filtered = allMessages.filter(m => 
                    (m.from === this.currentUser.username && m.to === this.activeChat) ||
                    (m.from === this.activeChat && m.to === this.currentUser.username)
                );

                const currentHtml = box.innerHTML;
                let newHtml = '';
                filtered.forEach(m => {
                    const isOwn = m.from === this.currentUser.username;
                    newHtml += `
                        <div class="msg ${isOwn ? 'own' : 'other'}">
                            ${this.escapeHtml(m.text)}
                            <span class="msg-time">${m.time}</span>
                        </div>
                    `;
                });

                if (currentHtml !== newHtml) {
                    box.innerHTML = newHtml;
                    box.scrollTop = box.scrollHeight;
                }
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            // --- АДМІНКА ---
            openAdmin() {
                const table = document.getElementById('admin-user-table');
                const users = this.getDb('users');
                table.innerHTML = '';

                Object.values(users).forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <b>${u.nick}</b><br><small>@${u.username}</small>
                        </td>
                        <td>
                            ${u.isBanned ? '<span style="color:red">BAN</span>' : '<span class="status-badge status-online">OK</span>'}
                            ${u.verified ? ' | ✔' : ''}
                        </td>
                        <td>
                            <button onclick="app.adminAction('${u.username}', 'verify')">✔</button>
                            <button onclick="app.adminAction('${u.username}', 'ban')" style="color:red">🚫</button>
                        </td>
                    `;
                    table.appendChild(tr);
                });

                document.getElementById('modal-admin').style.display = 'flex';
            },

            adminAction(username, type) {
                const users = this.getDb('users');
                if (type === 'verify') users[username].verified = !users[username].verified;
                if (type === 'ban') users[username].isBanned = !users[username].isBanned;
                
                this.setDb('users', users);
                this.openAdmin(); // оновити таблицю
                if (this.activeChat === username) this.selectChat(username);
            },

            // --- НАЛАШТУВАННЯ ---
            openSettings() {
                document.getElementById('set-nick').value = this.currentUser.nick;
                document.getElementById('modal-settings').style.display = 'flex';
            },

            saveProfile() {
                const newNick = document.getElementById('set-nick').value.trim();
                const users = this.getDb('users');
                if (newNick) {
                    users[this.currentUser.username].nick = newNick;
                    this.currentUser.nick = newNick;
                    this.setDb('users', users);
                    alert("Профіль оновлено");
                    this.closeModals();
                    this.renderUserList();
                }
            },

            toggleTheme() {
                const isDark = document.getElementById('theme-toggle').checked;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                localStorage.setItem('tg_theme', isDark ? 'dark' : 'light');
            },

            closeModals() {
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            }
        };

        app.init();
    </script>
</body>
</html>
