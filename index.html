<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Messenger Pro</title>
    <style>
        :root {
            --primary: #3390ec;
            --bg-main: #ffffff;
            --bg-sidebar: #f4f4f5;
            --text-main: #000000;
            --text-muted: #707579;
            --border: #dfe1e5;
            --msg-own: #eeffde;
            --msg-other: #ffffff;
            --font-size: 15px;
        }

        [data-theme="dark"] {
            --primary: #8774e1;
            --bg-main: #181818;
            --bg-sidebar: #212121;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #303030;
            --msg-own: #766ac8;
            --msg-other: #212121;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; transition: 0.2s ease; }
        body { height: 100vh; display: flex; background: var(--bg-main); color: var(--text-main); font-size: var(--font-size); overflow: hidden; }

        /* --- ВЕРИФІКАЦІЯ (ЯК НА ФОТО) --- */
        .premium-badge {
            width: 18px; height: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            vertical-align: middle; margin-left: 5px;
        }
        .premium-badge svg { width: 100%; height: 100%; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1)); }

        /* --- АВАТАРКИ --- */
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: white; background-size: cover; flex-shrink: 0;
        }
        .avatar-preview { width: 45px; height: 45px; cursor: pointer; border-radius: 50%; border: 2px solid transparent; }
        .avatar-preview.active { border-color: var(--primary); transform: scale(1.1); }

        /* --- UI ЕЛЕМЕНТИ --- */
        #auth-screen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: var(--bg-sidebar); z-index: 2000; }
        .box { background: var(--bg-main); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--bg-main); color: var(--text-main); outline: none; }
        .btn { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        
        /* --- ГОЛОВНИЙ ЕКРАН --- */
        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        .sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-main); }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-sidebar); }

        .user-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .user-item:hover { background: rgba(0,0,0,0.05); }
        .user-item.active { background: var(--primary); color: white; }
        
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; position: relative; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.own { align-self: flex-end; background: var(--msg-own); color: #000; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }

        /* Маркування */
        .marked-user { border-left: 4px solid #ff9800 !important; }

        /* --- МОДАЛКИ --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-main); padding: 25px; border-radius: 20px; width: 400px; position: relative; }
    </style>
</head>
<body>

    <svg style="display: none;">
        <symbol id="icon-verify" viewBox="0 0 24 24">
            <path fill="#3390ec" d="M22.5,12c0-0.7-0.4-1.4-1-1.7c0.6-0.9,0.5-2.2-0.3-2.9c-0.8-0.8-2.1-0.9-2.9-0.3c-0.4-0.6-1-1-1.7-1c-0.7,0-1.4,0.4-1.7,1c-0.9-0.6-2.2-0.5-2.9,0.3c-0.8,0.8-0.9,2.1-0.3,2.9c-0.6,0.4-1,1-1,1.7s0.4,1.4,1,1.7c-0.6,0.9-0.5,2.2,0.3,2.9c0.8,0.8,2.1,0.9,2.9,0.3c0.4,0.6,1,1,1.7,1c0.7,0,1.4-0.4,1.7-1c0.9,0.6,2.2,0.5,2.9-0.3c0.8-0.8,0.9-2.1,0.3-2.9C22.1,13.4,22.5,12.7,22.5,12z"/>
            <path fill="white" d="M10,12.5l2,2l5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </symbol>
    </svg>

    <div id="auth-screen">
        <div class="box">
            <h2 style="color: var(--primary);">Vortex Login</h2>
            <input type="text" id="auth-user" placeholder="Логін">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button class="btn" onclick="app.login()">Увійти</button>
            <p style="margin-top: 10px; font-size: 13px; cursor: pointer;" onclick="app.register()">Зареєструвати новий акаунт</p>
        </div>
    </div>

    <div id="app-screen">
        <aside class="sidebar">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
                <b id="my-name">Vortex</b>
                <span onclick="app.openSettings()" style="cursor: pointer;">⚙️</span>
            </div>
            <div style="padding: 10px;">
                <input type="text" id="search" placeholder="Пошук..." oninput="app.renderUsers()">
            </div>
            <div class="user-list" id="user-list"></div>
        </aside>

        <main class="chat-area">
            <div id="chat-header" style="padding: 15px; background: var(--bg-main); border-bottom: 1px solid var(--border); display: none;">
                <b id="chat-with">Нікнейм</b>
            </div>
            <div class="messages" id="msg-box"></div>
            <div style="padding: 15px; background: var(--bg-main); display: flex; gap: 10px;">
                <input type="text" id="msg-input" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter') app.send()">
                <button class="btn" style="width: 80px; margin: 0;" onclick="app.send()">></button>
            </div>
        </main>
    </div>

    <div class="modal" id="modal-settings">
        <div class="modal-content">
            <h3>Налаштування</h3>
            <div style="margin: 15px 0;">
                <p style="font-size: 13px; color: var(--text-muted);">Оберіть аватар:</p>
                <div id="avatar-list" style="display: flex; gap: 10px; margin: 10px 0;"></div>
                
                <p style="font-size: 13px; color: var(--text-muted); margin-top: 10px;">Розмір тексту:</p>
                <select id="set-font" onchange="app.updateFontSize()">
                    <option value="14px">Малий</option>
                    <option value="16px" selected>Середній</option>
                    <option value="18px">Великий</option>
                </select>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                    <span>Темна тема</span>
                    <input type="checkbox" id="dark-mode" style="width: auto;" onchange="app.toggleTheme()">
                </div>
            </div>
            <button class="btn" onclick="app.closeModals()">Закрити</button>
        </div>
    </div>

    <div class="modal" id="modal-admin">
        <div class="modal-content" style="width: 500px;">
            <h3 style="color: var(--primary);">Admin Panel (vortex only)</h3>
            <div id="admin-users" style="margin-top: 15px; max-height: 300px; overflow-y: auto;"></div>
            <button class="btn btn-secondary" onclick="app.closeModals()">Закрити</button>
        </div>
    </div>

    <script>
        const app = {
            currentUser: null,
            activeChat: null,
            users: JSON.parse(localStorage.getItem('v_users')) || {},
            messages: JSON.parse(localStorage.getItem('v_msgs')) || [],
            avatars: [
                'linear-gradient(45deg, #ff9a9e, #fad0c4)',
                'linear-gradient(45deg, #a1c4fd, #c2e9fb)',
                'linear-gradient(45deg, #84fab0, #8fd3f4)',
                'linear-gradient(45deg, #fccb90, #d57eeb)',
                'linear-gradient(45deg, #cfd9df, #e2ebf0)'
            ],

            init() {
                this.setupHotkeys();
                const session = localStorage.getItem('v_session');
                if (session && this.users[session]) {
                    this.currentUser = this.users[session];
                    this.start();
                }
            },

            setupHotkeys() {
                window.addEventListener('keydown', (e) => {
                    // Ctrl + Shift + Alt + A
                    if (e.ctrlKey && e.shiftKey && e.altKey && e.code === 'KeyA') {
                        if (this.currentUser && this.currentUser.username === 'vortex') {
                            this.openAdmin();
                        } else {
                            alert("Доступ заборонено. Тільки для vortex.");
                        }
                    }
                });
            },

            login() {
                const u = document.getElementById('auth-user').value.toLowerCase();
                const p = document.getElementById('auth-pass').value;
                if (this.users[u] && this.users[u].pass === p) {
                    this.currentUser = this.users[u];
                    localStorage.setItem('v_session', u);
                    this.start();
                } else {
                    alert("Помилка входу");
                }
            },

            register() {
                const u = document.getElementById('auth-user').value.toLowerCase();
                const p = document.getElementById('auth-pass').value;
                if (!u || p.length < 4) return alert("Мінімум 4 символи");
                if (this.users[u]) return alert("Логін зайнятий");
                
                this.users[u] = { 
                    username: u, pass: p, nick: u, 
                    verified: u === 'vortex', marked: false, 
                    avatar: this.avatars[0], theme: 'light' 
                };
                this.save();
                alert("Успішно! Тепер увійдіть.");
            },

            start() {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                document.getElementById('my-name').innerText = this.currentUser.nick;
                this.renderUsers();
                this.applySettings();
            },

            renderUsers() {
                const list = document.getElementById('user-list');
                const query = document.getElementById('search').value.toLowerCase();
                list.innerHTML = '';
                
                Object.values(this.users).forEach(u => {
                    if (u.username === this.currentUser.username) return;
                    if (!u.username.includes(query)) return;

                    const div = document.createElement('div');
                    div.className = `user-item ${this.activeChat === u.username ? 'active' : ''} ${u.marked ? 'marked-user' : ''}`;
                    div.onclick = () => this.selectChat(u.username);
                    
                    div.innerHTML = `
                        <div class="avatar" style="background: ${u.avatar}">${u.nick[0].toUpperCase()}</div>
                        <div style="margin-left: 15px;">
                            <b>${u.nick}</b> ${u.verified ? this.badge() : ''}
                            <div style="font-size: 12px; opacity: 0.7;">@${u.username}</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            },

            badge() {
                return `<span class="premium-badge"><svg><use href="#icon-verify"></use></svg></span>`;
            },

            selectChat(u) {
                this.activeChat = u;
                document.getElementById('chat-header').style.display = 'block';
                document.getElementById('chat-with').innerText = this.users[u].nick;
                this.renderMessages();
                this.renderUsers();
            },

            send() {
                const input = document.getElementById('msg-input');
                if (!input.value.trim() || !this.activeChat) return;
                
                this.messages.push({
                    from: this.currentUser.username,
                    to: this.activeChat,
                    text: input.value,
                    time: Date.now()
                });
                input.value = '';
                this.save();
                this.renderMessages();
            },

            renderMessages() {
                const box = document.getElementById('msg-box');
                box.innerHTML = '';
                this.messages.filter(m => 
                    (m.from === this.currentUser.username && m.to === this.activeChat) ||
                    (m.from === this.activeChat && m.to === this.currentUser.username)
                ).forEach(m => {
                    const div = document.createElement('div');
                    div.className = `msg ${m.from === this.currentUser.username ? 'own' : 'other'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            },

            openSettings() {
                const list = document.getElementById('avatar-list');
                list.innerHTML = '';
                this.avatars.forEach(av => {
                    const img = document.createElement('div');
                    img.className = `avatar-preview ${this.currentUser.avatar === av ? 'active' : ''}`;
                    img.style.background = av;
                    img.onclick = () => {
                        this.currentUser.avatar = av;
                        this.save();
                        this.openSettings();
                        this.renderUsers();
                    };
                    list.appendChild(img);
                });
                document.getElementById('modal-settings').style.display = 'flex';
            },

            openAdmin() {
                const box = document.getElementById('admin-users');
                box.innerHTML = '';
                Object.values(this.users).forEach(u => {
                    const div = document.createElement('div');
                    div.style = 'display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border);';
                    div.innerHTML = `
                        <span>${u.username} ${u.verified ? '✔️' : ''}</span>
                        <div>
                            <button onclick="app.adminToggle('${u.username}', 'verified')">Галочка</button>
                            <button onclick="app.adminToggle('${u.username}', 'marked')">Помітка</button>
                        </div>
                    `;
                    box.appendChild(div);
                });
                document.getElementById('modal-admin').style.display = 'flex';
            },

            adminToggle(u, field) {
                this.users[u][field] = !this.users[u][field];
                this.save();
                this.openAdmin();
                this.renderUsers();
            },

            updateFontSize() {
                const size = document.getElementById('set-font').value;
                document.documentElement.style.setProperty('--font-size', size);
            },

            toggleTheme() {
                const isDark = document.getElementById('dark-mode').checked;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            },

            applySettings() {
                this.updateFontSize();
            },

            closeModals() {
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            },

            save() {
                localStorage.setItem('v_users', JSON.stringify(this.users));
                localStorage.setItem('v_msgs', JSON.stringify(this.messages));
                if (this.currentUser) this.users[this.currentUser.username] = this.currentUser;
            }
        };

        app.init();
    </script>
</body>
</html>
