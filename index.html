<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CS2 Web Ultimate - Build 2.0</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }

        /* UI Overlay */
        #ui-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); pointer-events: all; }
        .hidden { display: none !important; }

        /* Buttons */
        .btn {
            background: #f39c12; border: none; color: #000; padding: 15px 50px; font-size: 24px; cursor: pointer;
            margin: 10px; font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.2s; min-width: 250px;
        }
        .btn:hover { background: #fff; transform: scale(1.05); }

        /* Inventory */
        .inv-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; max-width: 900px; }
        .skin-card { 
            background: #1a1a1a; border: 2px solid #333; padding: 10px; text-align: center; cursor: pointer;
            transition: 0.3s; color: #fff;
        }
        .skin-card:hover { border-color: #f39c12; background: #222; }
        .skin-card.active { border-color: #f39c12; background: rgba(243, 156, 18, 0.2); }
        .rarity-gold { border-bottom: 4px solid #e67e22; }
        .rarity-red { border-bottom: 4px solid #eb4b4b; }

        /* HUD */
        #hud { position: absolute; bottom: 0; width: 100%; padding: 30px; display: flex; justify-content: space-between; align-items: flex-end; box-sizing: border-box; }
        .stat-block { background: rgba(0,0,0,0.7); padding: 15px 40px; border-left: 8px solid #f39c12; color: #fff; }
        .hp-val { font-size: 60px; line-height: 1; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); border: 2px solid #0f0; border-radius: 50%; opacity: 0.7; }
        
        .weapon-list { display: flex; gap: 10px; }
        .w-item { width: 140px; height: 70px; background: rgba(0,0,0,0.7); border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; text-align: center; }
        .w-item.active { border: 2px solid #f39c12; background: rgba(243, 156, 18, 0.2); }

        /* Pause Menu */
        #pause-menu { background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="ui-wrapper">
    <div id="lobby-screen" class="screen">
        <h1 style="color:#f39c12; font-size: 80px; margin-bottom: 20px;">CS2 WEB</h1>
        <button class="btn" onclick="showModes()">ГРАТИ</button>
        <button class="btn" onclick="showInventory()" style="background:#444; color:#fff;">ІНВЕНТАР</button>
    </div>

    <div id="mode-screen" class="screen hidden">
        <h2 style="color:#fff;">ОБЕРІТЬ РЕЖИМ</h2>
        <button class="btn" onclick="initGame(1)">1 VS 1 (AIM MAP)</button>
        <button class="btn" onclick="initGame(2)">2 VS 2 (DUST 2 STYLE)</button>
        <button class="btn" onclick="hideScreens()" style="background:#444; color:#fff;">НАЗАД</button>
    </div>

    <div id="inventory-screen" class="screen hidden">
        <h2 style="color:#fff;">ВИБІР СКІНІВ</h2>
        <div class="inv-container">
            <div class="skin-card rarity-red" onclick="setSkin('akr', 'Vulcan', 0x2c3e50)">
                <div style="height:60px; background:#2c3e50;"></div>
                <p>AKR | Vulcan</p>
            </div>
            <div class="skin-card rarity-red" onclick="setSkin('akr', 'Asimov', 0xe67e22)">
                <div style="height:60px; background:#e67e22;"></div>
                <p>AKR | Asimov</p>
            </div>
            <div class="skin-card rarity-red" onclick="setSkin('pistol', 'Printstream', 0xffffff)">
                <div style="height:60px; background:#eee;"></div>
                <p>Pistol | Printstream</p>
            </div>
            <div class="skin-card rarity-gold" onclick="setSkin('knife', 'Fade', 0x8e44ad)">
                <div style="height:60px; background: linear-gradient(to right, #8e44ad, #e74c3c);"></div>
                <p>Knife | Fade</p>
            </div>
            <div class="skin-card rarity-gold" onclick="setSkin('knife', 'Lore', 0xf1c40f)">
                <div style="height:60px; background:#f1c40f;"></div>
                <p>Knife | Lore</p>
            </div>
        </div>
        <button class="btn" onclick="hideScreens()">ЗБЕРЕГТИ</button>
    </div>

    <div id="pause-menu" class="screen hidden">
        <h2 style="color:#fff;">ПАУЗА</h2>
        <button class="btn" onclick="resumeGame()">ПРОДОВЖИТИ</button>
        <button class="btn" onclick="exitToLobby()" style="background:#c0392b; color:#fff;">ВИЙТИ В ЛОББІ</button>
    </div>

    <div id="game-hud" class="hidden">
        <div id="crosshair"></div>
        <div id="hud">
            <div class="stat-block">
                <div style="font-size:12px; color:#f39c12;">ЗДОРОВ'Я</div>
                <div class="hp-val" id="hp-text">100</div>
            </div>
            <div class="weapon-list">
                <div id="ui-akr" class="w-item">AKR<br><small id="skin-akr-name">Default</small></div>
                <div id="ui-pistol" class="w-item">PISTOL<br><small id="skin-pistol-name">Default</small></div>
                <div id="ui-knife" class="w-item active">KNIFE<br><small id="skin-knife-name">Default</small></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * CS2 ULTIMATE ENGINE
 */

let scene, camera, renderer, clock, lobbyChar;
let isPaused = false, inGame = false;
let currentWeapon = 'knife';
let player = { hp: 100, speed: 0.15 };
let weapons = {
    akr: { color: 0x333333, name: 'Default' },
    pistol: { color: 0x222222, name: 'Default' },
    knife: { color: 0x555555, name: 'Default' }
};
let weaponGroup = new THREE.Group();
let bots = [], keys = {};

// Ініціалізація
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Sky blue
    scene.fog = new THREE.Fog(0x87ceeb, 10, 100);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // Світло
    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(50, 50, 50);
    sun.castShadow = true;
    scene.add(sun);

    createMap();
    setupLobby();
    animate();
}

function createMap() {
    // Підлога
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshStandardMaterial({ color: 0x444444 })
    );
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Стіни (Box geometry)
    for(let i=0; i<30; i++) {
        const wall = new THREE.Mesh(
            new THREE.BoxGeometry(4, 3, 4),
            new THREE.MeshStandardMaterial({ color: 0x888888 })
        );
        wall.position.set(Math.random()*80-40, 1.5, Math.random()*80-40);
        scene.add(wall);
    }
}

function setupLobby() {
    inGame = false;
    camera.position.set(0, 1.6, 5);
    camera.lookAt(0, 1, 0);
    
    lobbyChar = createCharacter(0x3498db); // Blue player
    lobbyChar.position.set(0, 0, 0);
    scene.add(lobbyChar);
}

/**
 * ГЕНЕРАЦІЯ МОДЕЛЕЙ З РУКАМИ
 */
function createCharacter(color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2, 4, 8), new THREE.MeshStandardMaterial({color: color}));
    body.position.y = 1;
    group.add(body);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    head.position.y = 1.8;
    group.add(head);
    return group;
}

function updateWeaponView() {
    while(weaponGroup.children.length > 0) weaponGroup.remove(weaponGroup.children[0]);
    
    const skinColor = weapons[currentWeapon].color;
    let model = new THREE.Group();

    // РУКИ (Дві руки персонажа)
    const handMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
    const sleeveMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

    const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.6), sleeveMat);
    leftArm.position.set(-0.3, -0.2, 0.2);
    leftArm.rotation.x = -0.4;
    model.add(leftArm);

    const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.6), sleeveMat);
    rightArm.position.set(0.3, -0.2, 0.2);
    rightArm.rotation.x = -0.4;
    model.add(rightArm);

    // ЗБРОЯ
    if(currentWeapon === 'akr') {
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.7), new THREE.MeshStandardMaterial({color: skinColor}));
        model.add(body);
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
        barrel.rotation.x = Math.PI/2; barrel.position.z = 0.5; model.add(barrel);
    } else if(currentWeapon === 'pistol') {
        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.3), new THREE.MeshStandardMaterial({color: skinColor}));
        model.add(frame);
    } else {
        // Butterfly Knife
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.3, 0.05), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 1}));
        blade.position.z = 0.2; blade.rotation.x = Math.PI/2;
        model.add(blade);
        const h1 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.2), new THREE.MeshStandardMaterial({color: skinColor}));
        h1.position.set(0.02, 0, 0); model.add(h1);
        const h2 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.2), new THREE.MeshStandardMaterial({color: skinColor}));
        h2.position.set(-0.02, 0, 0); model.add(h2);
    }

    model.position.set(0, -0.2, -0.5);
    weaponGroup.add(model);
    camera.add(weaponGroup);
}

/**
 * ЛОГІКА СКІНІВ ТА МЕНЮ
 */
function setSkin(type, name, color) {
    weapons[type].name = name;
    weapons[type].color = color;
    document.getElementById(`skin-${type}-name`).innerText = name;
    alert(`Вибрано ${type} | ${name}`);
}

function showInventory() {
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('inventory-screen').classList.remove('hidden');
}

function showModes() {
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('mode-screen').classList.remove('hidden');
}

function hideScreens() {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('lobby-screen').classList.remove('hidden');
}

function initGame(mode) {
    hideScreens();
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('game-hud').classList.remove('hidden');
    
    inGame = true;
    player.hp = 100;
    scene.remove(lobbyChar);
    
    camera.position.set(10, 1.6, 10);
    document.body.requestPointerLock();
    
    updateWeaponView();
    spawnBots(mode);
}

function spawnBots(mode) {
    bots.forEach(b => scene.remove(b));
    bots = [];
    // Enemies (Red)
    for(let i=0; i<mode; i++) {
        let b = createCharacter(0xeb4b4b);
        b.position.set(Math.random()*20-10, 0, -20);
        b.userData = { hp: 100, target: true };
        bots.push(b);
        scene.add(b);
    }
}

/**
 * ESCAPE ТА ПАУЗА
 */
document.addEventListener('keydown', (e) => {
    if(e.code === 'Escape' && inGame) {
        if(!isPaused) pauseGame();
        else resumeGame();
    }
    if(!isPaused) {
        keys[e.code] = true;
        if(e.code === 'Digit1') switchWeapon('akr');
        if(e.code === 'Digit2') switchWeapon('pistol');
        if(e.code === 'Digit3') switchWeapon('knife');
    }
});

document.addEventListener('keyup', (e) => keys[e.code] = false);

function pauseGame() {
    isPaused = true;
    document.exitPointerLock();
    document.getElementById('pause-menu').classList.remove('hidden');
}

function resumeGame() {
    isPaused = false;
    document.body.requestPointerLock();
    document.getElementById('pause-menu').classList.add('hidden');
}

function exitToLobby() {
    location.reload(); // Найпростіший спосіб скинути стан
}

function switchWeapon(type) {
    currentWeapon = type;
    document.querySelectorAll('.w-item').forEach(i => i.classList.remove('active'));
    document.getElementById(`ui-${type}`).classList.add('active');
    updateWeaponView();
}

/**
 * ІГРОВИЙ ЦИКЛ
 */
function handleShoot() {
    if(!inGame || isPaused) return;

    // Анімація віддачі
    weaponGroup.position.z += 0.05;
    setTimeout(() => weaponGroup.position.z -= 0.05, 50);

    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(bots, true);

    if(hits.length > 0) {
        let bot = hits[0].object;
        while(bot.parent && !bot.userData.hp) bot = bot.parent;
        if(bot.userData.hp) {
            bot.userData.hp -= (currentWeapon === 'akr' ? 40 : 25);
            if(bot.userData.hp <= 0) {
                scene.remove(bot);
                bots = bots.filter(b => b !== bot);
            }
        }
    }
}

document.addEventListener('mousedown', handleShoot);

document.addEventListener('mousemove', (e) => {
    if(inGame && !isPaused && document.pointerLockElement) {
        camera.rotation.y -= e.movementX * 0.002;
        camera.rotation.x -= e.movementY * 0.002;
        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
    }
});

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if(inGame && !isPaused) {
        // Movement
        const move = new THREE.Vector3();
        if(keys['KeyW']) move.z -= 1;
        if(keys['KeyS']) move.z += 1;
        if(keys['KeyA']) move.x -= 1;
        if(keys['KeyD']) move.x += 1;
        move.normalize().applyQuaternion(camera.quaternion);
        camera.position.x += move.x * player.speed;
        camera.position.z += move.z * player.speed;
        camera.position.y = 1.6;

        // Bot AI
        bots.forEach(bot => {
            bot.lookAt(camera.position.x, 0, camera.position.z);
            bot.translateZ(0.05);
            if(bot.position.distanceTo(camera.position) < 2) {
                player.hp -= 0.2;
                document.getElementById('hp-text').innerText = Math.ceil(player.hp);
                if(player.hp <= 0) exitToLobby();
            }
        });

        // Weapon Sway
        weaponGroup.position.y = -0.1 + Math.sin(Date.now()*0.005)*0.01;
    } else if(!inGame) {
        if(lobbyChar) lobbyChar.rotation.y += 0.01;
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();

</script>
</body>
</html>
