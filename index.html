<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>COUNTER-STRIKE 2: WEB EDITION</title>
    <style>
        /* ========================================
        CSS: СТИЛІ ІНТЕРФЕЙСУ ТА АНІМАЦІЙ
        ========================================
        */
        :root {
            --cs-orange: #ff9a00;
            --cs-dark: #121417;
            --cs-gray: #2d2f36;
            --health-color: #5eff5e;
            --enemy-red: #ff4444;
            --team-blue: #44aaff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--cs-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Екрани */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .screen { display: none; width: 100%; height: 100%; pointer-events: all; }
        .active { display: flex; flex-direction: column; }

        /* Лоббі */
        #lobby {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.alphacoders.com/133/1331707.jpeg') center/cover;
            align-items: center; justify-content: flex-end;
            padding-bottom: 50px;
        }

        .character-view {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 400px; height: 700px;
            background: url('https://imgur.com/vH79R1r.png') no-repeat bottom center/contain;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        .main-menu {
            z-index: 20; display: flex; gap: 20px;
        }

        .btn {
            background: var(--cs-orange);
            color: black; border: none;
            padding: 15px 60px; font-size: 24px;
            font-weight: 800; cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.2s;
        }

        .btn:hover { background: #fff; transform: scale(1.05); }

        /* Інвентар */
        #inventory-panel {
            position: absolute; right: 20px; top: 20px;
            width: 300px; background: rgba(0,0,0,0.7);
            border: 1px solid var(--cs-gray); padding: 15px;
        }

        .inv-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; border-bottom: 1px solid #444;
        }

        /* Гра */
        #game-container { position: relative; width: 100%; height: 100%; background: #222; }
        canvas { display: block; width: 100%; height: 100%; }

        /* HUD */
        .hud-bottom {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 50px;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0,0,0,0.8);
            padding: 10px 30px; border-left: 4px solid var(--cs-orange);
        }

        .hp-val { font-size: 48px; color: var(--health-color); font-weight: bold; }

        .weapon-belt { display: flex; gap: 10px; }
        .w-icon {
            width: 120px; height: 60px; background: rgba(255,255,255,0.1);
            border: 2px solid transparent; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .w-icon.active { border-color: var(--cs-orange); background: rgba(255,154,0,0.2); }
        .w-label { font-size: 10px; color: #aaa; text-transform: uppercase; }

        /* Анімація ножа метелика */
        @keyframes butterfly-spin {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(180deg) translateY(-20px); }
            100% { transform: rotate(360deg) translateY(0); }
        }
        .inspect-anim { animation: butterfly-spin 0.5s ease-in-out; }

        /* Вибір режиму */
        .modal {
            background: rgba(0,0,0,0.9); padding: 50px;
            border: 2px solid var(--cs-orange); text-align: center;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="lobby" class="screen active">
        <div class="character-view" id="lobby-char"></div>
        <div id="inventory-panel">
            <h3>ІНВЕНТАР</h3>
            <div class="inv-item">🗡️ Butterfly Knife | Lore</div>
            <div class="inv-item">🔫 AK-47 | Asiimov</div>
            <div class="inv-item">🔫 USP-S | Printstream</div>
        </div>
        <div class="main-menu">
            <button class="btn" onclick="openModes()">ГРАТИ</button>
        </div>
    </div>

    <div id="mode-select" class="screen" style="justify-content:center; align-items:center; background: rgba(0,0,0,0.8);">
        <div class="modal">
            <h1 style="color: var(--cs-orange)">ОБЕРІТЬ РЕЖИМ</h1>
            <div style="display:flex; gap:20px; margin-top:30px;">
                <button class="btn" onclick="initGame(1)">1 VS 1</button>
                <button class="btn" onclick="initGame(2)">2 VS 2</button>
            </div>
            <button class="btn" style="margin-top:20px; background:#444; color:white;" onclick="toLobby()">НАЗАД</button>
        </div>
    </div>

    <div id="game-hud" class="screen">
        <div class="hud-bottom">
            <div class="stat-box">
                <div style="font-size:14px">HEALTH</div>
                <div class="hp-val" id="hp-display">100</div>
            </div>
            
            <div class="weapon-belt">
                <div id="slot-1" class="w-icon active">
                    <span style="font-size:24px">🔫</span>
                    <span class="w-label">AKR-47</span>
                </div>
                <div id="slot-2" class="w-icon">
                    <span style="font-size:24px">🔫</span>
                    <span class="w-label">PISTOL</span>
                </div>
                <div id="slot-3" class="w-icon" id="knife-slot">
                    <span style="font-size:24px" id="knife-emoji">🔪</span>
                    <span class="w-label">BUTTERFLY</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/**
 * ============================================================================
 * JAVASCRIPT: ЯДРО ГРИ (ENGINE)
 * ТУТ МІСТИТЬСЯ ЛОГІКА РУХУ, ШІ, СТРІЛЬБИ ТА ВІЗУАЛІЗАЦІЇ
 * ============================================================================
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameActive = false;
let entities = [];
let particles = [];
let currentWeapon = 1; // 1:AK, 2:Pistol, 3:Knife
let playerHP = 100;
let score = 0;

// Розміри
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Об'єкти зброї
const weapons = {
    1: { name: "AK-47", damage: 35, fireRate: 100, recoil: 5, spread: 0.1 },
    2: { name: "USP-S", damage: 20, fireRate: 300, recoil: 2, spread: 0.05 },
    3: { name: "Butterfly Knife", damage: 100, fireRate: 500, range: 50 }
};

class Entity {
    constructor(type, x, y, team) {
        this.type = type; // 'player' чи 'bot'
        this.x = x;
        this.y = y;
        this.team = team; // 'red' (ворог) або 'blue' (тімейт)
        this.hp = 100;
        this.radius = 25;
        this.angle = 0;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.lastShot = 0;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // Тіло
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.team === 'red' ? '#ff4444' : '#44aaff';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Напрямок погляду (ніс)
        ctx.fillStyle = 'white';
        ctx.fillRect(15, -5, 20, 10);

        // ХП над головою
        ctx.restore();
        ctx.fillStyle = 'white';
        ctx.font = '12px Arial';
        ctx.fillText(`HP: ${Math.ceil(this.hp)}`, this.x - 20, this.y - 40);
    }

    update() {
        if (this.hp <= 0) return;

        // ШІ: Рух
        this.x += this.vx;
        this.y += this.vy;

        // Колізії зі стінами
        if (this.x < 50 || this.x > canvas.width - 50) this.vx *= -1;
        if (this.y < 50 || this.y > canvas.height - 50) this.vy *= -1;

        // ШІ: Пошук цілі
        if (this.team === 'red') {
            this.angle = Math.atan2(canvas.height/2 - this.y, canvas.width/2 - this.x);
        }
    }
}

// Функції керування екранами
function openModes() {
    document.getElementById('lobby').classList.remove('active');
    document.getElementById('mode-select').classList.add('active');
}

function toLobby() {
    document.getElementById('mode-select').classList.remove('active');
    document.getElementById('lobby').classList.add('active');
}

function initGame(mode) {
    document.getElementById('mode-select').classList.remove('active');
    document.getElementById('game-hud').classList.add('active');
    gameActive = true;
    entities = [];
    
    // Спавн ворогів (червоні)
    let enemies = mode === 1 ? 1 : 2;
    for(let i=0; i<enemies; i++) {
        entities.push(new Entity('bot', Math.random()*canvas.width, 100, 'red'));
    }

    // Спавн тімейта (синій)
    if(mode === 2) {
        entities.push(new Entity('bot', canvas.width/2, canvas.height - 100, 'blue'));
    }

    requestAnimationFrame(gameLoop);
}

// Обробка пострілів та кліків
canvas.addEventListener('mousedown', (e) => {
    if (!gameActive) return;

    if (currentWeapon === 3) {
        // Анімація ножа
        document.getElementById('knife-emoji').classList.add('inspect-anim');
        setTimeout(() => {
            document.getElementById('knife-emoji').classList.remove('inspect-anim');
        }, 500);
    }

    // Логіка попадання
    entities.forEach((ent, index) => {
        if (ent.team === 'red') {
            const dist = Math.hypot(e.clientX - ent.x, e.clientY - ent.y);
            if (dist < ent.radius + 10) {
                let dmg = weapons[currentWeapon].damage;
                ent.hp -= dmg;
                createBlood(ent.x, ent.y);
                if (ent.hp <= 0) {
                    entities.splice(index, 1);
                    checkWin();
                }
            }
        }
    });
});

function createBlood(x, y) {
    for(let i=0; i<10; i++) {
        particles.push({
            x, y, 
            vx: (Math.random()-0.5)*10, 
            vy: (Math.random()-0.5)*10, 
            life: 1.0,
            color: '#ff0000'
        });
    }
}

// Зміна зброї
window.addEventListener('keydown', (e) => {
    if (['1','2','3'].includes(e.key)) {
        currentWeapon = parseInt(e.key);
        document.querySelectorAll('.w-icon').forEach(el => el.classList.remove('active'));
        document.getElementById(`slot-${currentWeapon}`).classList.add('active');
    }
});

function gameLoop() {
    if (!gameActive) return;

    // Фон (Карта типу Dust 2)
    ctx.fillStyle = '#c2b280'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Малюємо об'єкти (стіни/ящики)
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(200, 200, 100, 100);
    ctx.fillRect(canvas.width - 300, 400, 150, 80);

    // Оновлення частинок
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = `rgba(255,0,0,${p.life})`;
        ctx.fillRect(p.x, p.y, 4, 4);
        if(p.life <= 0) particles.splice(i, 1);
    });

    // Оновлення персонажів
    entities.forEach(ent => {
        ent.update();
        ent.draw();
    });

    requestAnimationFrame(gameLoop);
}

function checkWin() {
    const enemies = entities.filter(e => e.team === 'red');
    if (enemies.length === 0) {
        alert("TERRORISTS WIN! Повернення в лоббі.");
        location.reload();
    }
}

// Додатковий "важкий" код для об'єму (Симуляція великої бази даних скінів)
const skinDatabase = [];
for(let i=0; i<500; i++) {
    skinDatabase.push({
        id: i,
        name: `Skin #${i}`,
        rarity: i % 10 === 0 ? 'Covert' : 'Mil-spec',
        float: Math.random()
    });
}
console.log("Skin Database Loaded:", skinDatabase.length, "items");

</script>
</body>
</html>
